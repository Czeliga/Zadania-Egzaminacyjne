<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styl7.css">
    <title>Galeria</title>
</head>
<body>
    <header>
        <h2>Galeria miejsc ciekawych</h2>
    </header>

    <main>
        <img src="lanzarotte.jpg" alt="galeria" id="mainObraz">
    </main>

    <aside class="lewy">
        <h3>Przeglądaj zdjęcia</h3>
        <img src="lanzarotte.jpg" alt="lanzarotte" onclick="zmienGlowne('lanzarotte.jpg')">
        <img src="pekin.jpg" alt="pekin" onclick="zmienGlowne('pekin.jpg')">
        <img src="serengeti.jpg" alt="serengeti" onclick="zmienGlowne('serengeti.jpg')">
        <img src="wenecja.jpg" alt="wenecja" onclick="zmienGlowne('wenecja.jpg')">
        <img src="tajlandia.jpg" alt="tajlandia" onclick="zmienGlowne('tajlandia.jpg')">   
    </aside>

    <aside class="prawy">
        <h3>Obrazy w naszej galerii</h3>
        <table>
            <tr>
                <td>Europa</td>
                <td>Azja</td>
                <td>Afryka</td>
            </tr>
            <tr>
                <td>2</td>
                <td>2</td>
                <td>1</td>
            </tr>
        </table>

        <p>Polub nas <img src="icon-off.png" onclick="ZmianaObrazu()" id="ikona"></p>

        <a href="https://pixabay.com" target="_blank">Odkryj więcej zdjęć</a> 
    </aside>

    <footer>Autor: Jakub Szeliga</footer>
</body>
</html>

<script>
    function ZmianaObrazu()
    {

        let obrazek = document.getElementById("ikona");

        if(obrazek.src.includes("icon-off.png"))
        {
        obrazek.src = "icon-on.png";
        }
        else
        {
        obrazek.src = "icon-off.png";
        }
        
        
    }


    function zmienGlowne(plik)
    {
        let glowny = document.getElementById("mainObraz");

        glowny.src = plik;
    }
</script>
